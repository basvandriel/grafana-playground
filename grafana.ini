# grafana.ini — Custom Grafana configuration.
# Mounted into the container by deploy-grafana.sh via a ConfigMap.
# Grafana is pointed to this file via GF_PATHS_CONFIG (see grafana-values.yaml).
#
# Feature toggles required for Git Sync (provisioning.grafana.app API):
#   provisioning         — enables the new provisioning subsystem and its CRD-like API
#   kubernetesDashboards — stores dashboards in the Kubernetes-style API backend,
#                          which is required for Git Sync to write back to Grafana

[feature_toggles]
provisioning = true
kubernetesDashboards = true
