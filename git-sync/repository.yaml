# repository.yaml — Git Sync repository definition (documentation reference).
#
# The actual configuration is applied to Grafana via configure-git-sync.sh,
# which posts this spec directly to Grafana's internal provisioning API.
#
# API: provisioning.grafana.app/v0alpha1 — served by Grafana's internal API,
# NOT a Kubernetes CRD. kubectl cannot apply this directly.
#
# Key settings:
#   path:            Only files under grafana/ are synced. Other files in the repo
#                    (scripts, values, etc.) are ignored by Git Sync.
#   intervalSeconds: Grafana polls the repo every 60 seconds for changes.
#   workflows:       'write' allows saving dashboards back to Git from the UI;
#                    'branch' creates a branch + PR instead of committing to main.
#   secure.token:    Set via GIT_SYNC_TOKEN in .env — passed securely by
#                    configure-git-sync.sh using the InlineSecureValue "create" field.
apiVersion: provisioning.grafana.app/v0alpha1
kind: Repository
metadata:
  name: grafana-playground
spec:
  title: grafana-playground
  type: github
  github:
    url: https://github.com/basvandriel/grafana-playground
    branch: main
    path: grafana/
    generateDashboardPreviews: false
  sync:
    enabled: true
    intervalSeconds: 60
    target: folder
  workflows:
    - write
    - branch
# Note: secure.token is injected at deploy time by configure-git-sync.sh
# and is never stored in this file.
